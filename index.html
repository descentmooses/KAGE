<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
  <!-- KAGE cache bootstrap: runs before React so stale GitHub Pages caches self-heal -->
  <script>
  (function(){try{
    var K='kage-deploy';
    function base(){
      var h=location.hostname;
      return (h==='localhost'||h==='127.0.0.1')?'/':'/KAGE/';
    }
    if('serviceWorker'in navigator){
      navigator.serviceWorker.getRegistrations().then(function(r){
        r.forEach(function(x){x.unregister()});
      });
    }
    if('caches'in window){
      caches.keys().then(function(keys){
        keys.forEach(function(n){caches.delete(n)});
      });
    }
    var b=base();
    fetch(b+'version.json?_='+Date.now(),{cache:'no-store',headers:{'Pragma':'no-cache'}})
      .then(function(r){if(!r.ok)throw 0;return r.json();})
      .then(function(d){
        var v=d&&d.version;if(!v)return;
        var stored=localStorage.getItem(K);
        var params=new URLSearchParams(location.search);
        var bust=params.get('bust');
        var root=b.replace(/\/?$/,'/');
        if(stored&&stored!==v){
          localStorage.setItem(K,v);
          if('serviceWorker'in navigator){
            navigator.serviceWorker.getRegistrations().then(function(r){
              r.forEach(function(x){x.unregister()});
            });
          }
          if('caches'in window){
            caches.keys().then(function(keys){keys.forEach(function(n){caches.delete(n)})});
          }
          location.replace(root+'?bust='+v);
          return;
        }
        if(!stored)localStorage.setItem(K,v);
        if(bust&&bust!==v){
          location.replace(root+'?bust='+v);
          return;
        }
        var meta=document.querySelector('meta[name="build-version"]');
        if(meta&&meta.content&&meta.content!==v){
          location.replace(root+'?bust='+v);
        }
      }).catch(function(){});
  }catch(e){}})();
  </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <meta name="description" content="KAGE — shadow mastery tracker for mind, body, and spirit" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kage" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Orbitron:wght@400;500;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <title>Kage</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
